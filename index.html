<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeJS - Your Functional Cooking Companion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>RecipeJS</h1>
  <p>Your Functional Cooking Companion</p>
</header>

<section class="controls">

  <!-- NEW: SEARCH BAR -->
  <div class="search">
    <input type="text" id="searchInput" placeholder="Search recipes..." />
  </div>

  <div class="filters">
    <button data-filter="all">All</button>
    <button data-filter="easy">Easy</button>
    <button data-filter="medium">Medium</button>
    <button data-filter="hard">Hard</button>
    <button data-filter="quick">Quick</button>
  </div>

  <div class="sorting">
    <button data-sort="name">Name A-Z</button>
    <button data-sort="time">Fastest</button>
  </div>

  <!-- NEW: FAVORITES FILTER -->
  <div class="favorites-filter">
    <label>
      <input type="checkbox" id="favFilter">
      Show Favorites Only
    </label>
  </div>

  <!-- NEW: COUNTER -->
  <p id="counter"></p>

</section>

<main>
  <div id="recipe-container">
    <!-- Recipe cards will be rendered here by JavaScript -->
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
